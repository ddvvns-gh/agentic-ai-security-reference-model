<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta content="noindex, nofollow" name="robots"/><title>Risk Library</title><style>@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');
:root{--bg:#05070a;--surface:#0a0e14;--surface2:#10161f;--border:#1a2332;--border-hi:#253445;--gold:#fbbf24;--cyan:#00c8d4;--text:#e2e8f0;--text2:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding:32px 28px 60px;min-width:760px}a{color:var(--cyan);text-decoration:none}a:hover{color:var(--gold)}
.hdr{border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:16px}.hdr-title{font-size:22px;font-weight:700;line-height:1.25}.hdr-title span{font-weight:400;color:var(--text2)}.hdr-sub{margin-top:8px;font-size:11px;color:var(--gold);font-family:'DM Mono',monospace;letter-spacing:.06em}
.navbar{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 18px}.navbar a{color:var(--text);border:1px solid var(--border-hi);background:var(--surface2);padding:7px 10px;border-radius:4px;font-size:11px}
.card{background:var(--surface);border:1px solid var(--border-hi);border-radius:8px;padding:15px 16px;color:var(--text2);line-height:1.55;font-size:13px}</style></head><body>
<div class="hdr"><div class="hdr-title">Risk Library<br/><span>Reference Model</span></div><div class="hdr-sub">Index of risks referenced by capability boxes</div></div>
<div class="navbar"><a href="../index.html">← Home</a><a href="../architecture.html">Architecture</a></div>
<div class="card">This library indexes per-capability risks pages. Entries are linked from their parent box pages; this index will be populated as the detail tier is built out.</div>
</body></html>
