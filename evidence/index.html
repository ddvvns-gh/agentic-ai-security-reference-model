<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta content="noindex, nofollow" name="robots"/><title>Evidence Library</title><style>@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');
:root{--bg:#05070a;--surface:#0a0e14;--surface2:#10161f;--border:#1a2332;--border-hi:#253445;--gold:#fbbf24;--cyan:#00c8d4;--text:#e2e8f0;--text2:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding:32px 28px 60px;min-width:760px}a{color:var(--cyan);text-decoration:none}a:hover{color:var(--gold)}
.hdr{border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:16px}.hdr-title{font-size:22px;font-weight:700;line-height:1.25}.hdr-title span{font-weight:400;color:var(--text2)}.hdr-sub{margin-top:8px;font-size:11px;color:var(--gold);font-family:'DM Mono',monospace;letter-spacing:.06em}
.navbar{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 18px}.navbar a{color:var(--text);border:1px solid var(--border-hi);background:var(--surface2);padding:7px 10px;border-radius:4px;font-size:11px}
.badge{display:inline-block;font-family:'DM Mono';font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:5px 9px;border-radius:4px;margin-bottom:14px}
.hero{background:linear-gradient(135deg, rgba(16,22,31,.98), rgba(10,14,20,.98));border:1px solid var(--border-hi);border-radius:10px;padding:20px 22px;margin-bottom:16px}.hero h1{font-size:21px;margin-bottom:8px}.hero p{color:var(--text2);line-height:1.6;font-size:14px}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}.meta .cell{border:1px solid var(--border-hi);background:var(--surface);border-radius:8px;padding:12px 14px;font-size:12px}.meta b{font-family:'DM Mono';font-size:9px;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:4px}
.sec{display:flex;align-items:center;gap:10px;margin:22px 0 12px}.sec-line{flex:1;height:1px;background:var(--border)}.sec-label{font-family:'DM Mono';font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--text2);text-transform:uppercase}
.card{background:var(--surface);border:1px solid var(--border-hi);border-radius:8px;padding:15px 16px;color:var(--text2);line-height:1.55;font-size:13px}.card ul{margin-left:18px;display:flex;flex-direction:column;gap:6px;margin-top:6px}
.note{border-left:3px solid var(--gold);background:rgba(251,191,36,.08);padding:11px 14px;border-radius:5px;color:var(--text2);font-size:12px;margin-top:14px}
.footer-nav{display:flex;justify-content:space-between;gap:12px;margin-top:24px;padding-top:18px;border-top:1px solid var(--border)}</style></head><body>
<div class="hdr"><div class="hdr-title">Evidence Library<br/><span>Reference Model</span></div><div class="hdr-sub">Index of evidence referenced by capability boxes</div></div>
<div class="navbar"><a href="../index.html">← Home</a><a href="../architecture.html">Architecture</a></div>
<div class="card">This library indexes per-capability evidence pages. Entries are linked from their parent box pages; this index will be populated as the detail tier is built out.</div>
</body></html>
